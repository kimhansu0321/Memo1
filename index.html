<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>심플 DB 메모장</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex; justify-content: center; align-items: center;
            height: 100vh; margin: 0; background: #f0f2f5;
        }
        .memo-container {
            background: white; padding: 30px; border-radius: 12px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px;
        }
        h2 { margin-top: 0; color: #333; text-align: center; font-size: 20px;}
        textarea {
            width: 100%; height: 75px;
            padding: 12px; border: 1px solid #ddd; border-radius: 8px;
            resize: none; box-sizing: border-box; font-size: 14px;
            margin-bottom: 15px; transition: border-color 0.3s;
        }
        textarea:focus { border-color: #4A90E2; outline: none; }
        
        .btn-group { display: flex; gap: 8px; }
        button {
            flex: 1; padding: 12px 0; border: none; border-radius: 8px;
            cursor: pointer; color: white; font-weight: bold; transition: 0.2s;
        }
        button:hover { opacity: 0.8; transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        .btn-save { background-color: #4CAF50; }
        .btn-load { background-color: #2196F3; }
        .btn-delete { background-color: #f44336; }
    </style>
</head>
<body>

<div class="memo-container">
    <h2>📝 간단 메모장</h2>
    <textarea id="memoInput" placeholder="여기에 메모를 작성하세요... (DB에 저장됨)"></textarea>
    <div class="btn-group">
        <button class="btn-save" onclick="saveMemo()">저장</button>
        <button class="btn-load" onclick="loadMemo()">불러오기</button>
        <button class="btn-delete" onclick="deleteMemo()">삭제</button>
    </div>
</div>

<script>
    const memoField = document.getElementById('memoInput');
    const API_URL = '/api/memo';

    async function saveMemo() {
        const content = memoField.value;
        if (!content.trim()) return alert("내용을 입력해주세요.");

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content })
            });
            if (response.ok) {
                alert("성공적으로 서버 DB에 저장되었습니다!");
            }
        } catch (error) {
            alert("서버 통신 오류가 발생했습니다.");
        }
    }

    async function loadMemo() {
        try {
            const response = await fetch(API_URL);
            const data = await response.json();
            
            if (data.content) {
                memoField.value = data.content;
            } else {
                alert("DB에 저장된 메모가 없습니다.");
                memoField.value = "";
            }
        } catch (error) {
            alert("서버 연결에 실패했습니다. 서버가 실행 중인지 확인해주세요.");
        }
    }

    async function deleteMemo() {
        if (!confirm("서버 DB에서 메모를 삭제할까요?")) return;

        try {
            const response = await fetch(API_URL, { method: 'DELETE' });
            if (response.ok) {
                memoField.value = "";
                alert("삭제되었습니다.");
            }
        } catch (error) {
            alert("서버 통신 오류가 발생했습니다.");
        }
    }

    window.onload = loadMemo;
</script>

</body>
</html>
